services:
  mysql:
    image: mysql:8.4
    container_name: vcollab-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vcollab}
      MYSQL_USER: ${MYSQL_USER:-vcollab}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-vcollab}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./vcollab-backend
    container_name: vcollab-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-vcollab}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-vcollab}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-vcollab}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      MEDIA_UPLOAD_DIR: /app/uploads
      MEDIA_BASE_URL: ${MEDIA_BASE_URL:-http://localhost:8080/uploads}
      MEDIA_PUBLIC_PATH: /uploads
      DB_MAX_POOL_SIZE: ${DB_MAX_POOL_SIZE:-15}
      DB_MIN_IDLE: ${DB_MIN_IDLE:-5}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./vcollab-frontend
    container_name: vcollab-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  mysql_data:
  backend_uploads:
