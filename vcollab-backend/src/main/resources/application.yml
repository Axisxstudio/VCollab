server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/vcollab_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 250MB

app:
  jwt:
    secret: ${JWT_SECRET:change-me-please-change-me-change-me-please-change-me}
    expiration: 86400000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  media:
    upload-dir: ${MEDIA_UPLOAD_DIR:uploads}
    base-url: ${MEDIA_BASE_URL:http://localhost:8080/uploads}
    public-path: ${MEDIA_PUBLIC_PATH:/uploads}

logging:
  level:
    org.springframework.security: INFO
    org.flywaydb: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
